name: Daily Database Backup

on:
  schedule:
    - cron: '0 21 * * *'   # 00:00 שעון ישראל (UTC+3)
  workflow_dispatch:         # הפעלה ידנית מה-Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get install -y curl ca-certificates
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/postgresql-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql-keyring.gpg] \
            https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-17
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Create backup directory
        run: mkdir -p backup

      # ── Full SQL dump (כל הטבלאות) ───────────────────────────────────
      - name: Full database dump
        env:
          DIRECT_URL: ${{ secrets.BACKUP_DIRECT_URL }}
        run: |
          /usr/lib/postgresql/17/bin/pg_dump "$DIRECT_URL" \
            --no-owner \
            --no-privileges \
            --format=plain \
            --file=backup/full_backup.sql
          echo "Backup size: $(du -sh backup/full_backup.sql | cut -f1)"

      # ── Human-readable JSON for critical tables ───────────────────────
      - name: Export lessons JSON
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          for table in lessons live_sessions responses; do
            curl -sf \
              -H "apikey: $SUPABASE_KEY" \
              -H "Authorization: Bearer $SUPABASE_KEY" \
              "$SUPABASE_URL/rest/v1/${table}?select=*" \
              -o "backup/${table}.json" \
              && echo "✓ $table" \
              || echo "✗ $table (table may not exist yet)"
          done

      # ── Upload artifacts (שמור 90 יום) ──────────────────────────────
      - name: Upload backup
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.run_id }}-${{ github.run_number }}
          path: backup/
          retention-days: 90
